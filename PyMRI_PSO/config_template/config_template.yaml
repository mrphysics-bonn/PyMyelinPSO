# This configuration file controls the Particle Swarm Optimization (PSO) of 
# synthetic or in vivo MRI data using the module:
# PyMRI_PSO - https://github.com/
#
# ---------------------
# 
# General and data source input parameters:
#
# a) general:       -
# b) source/file:   - input data file names (suffix: .nii or .nii.gz)
#                   - default is 'NO_FILE' if not available
#                   - all source files have to be located in the directory /prj_dir/nifti/
# c) source/signal: specification of the input types and inversion mode
# d) source/data:   input data specification
# e) source/mask:   input mask specification
#
general:
  PSO_version: '1.0'           # PyMRI_PSO package version
  verbose:     false           # extensive console output for debugging and progress monitoring
source:
  file:
    prj_dir:   ''              # str: project directory
    T1:        'NO_FILE'       # str: longitudinal relaxation
    T2:        ''              # str: multi echo spin echo
    T2S:       ''              # str: multi echo gradient echo magnitude
    CT2S:      ''              # str: multi echo gradient echo phase (complex T2S)
    TE:        ''              # 1D-array of echo times; NOTE: always necessary in current implementation
    B1:        ''              # radiofrequency (RF) transmit field
    ATLAS:     ''              # atlas of predefined MFW distribution
  signal:
    T1:        false           # whether to invert T1
    T2:        false           # whether to invert T2
    T2S:       true            # whether to invert T2S
    CT2S:      true            # whether to include CT2S <-> requires T2S = True
    SI:        true            # single-parameter inversion
    JI:        false           # joint multi-parameter inversion
  data:
    type:       ''             # ['invivo', 'atlas'] - data source for inversion
    add_noise:  [true,150]     # MWF atlas experiments: add noise on a specific SNR level
    norm_max:   true           # normalize input data to maximum signal amplitude (recommended)
    shape:      [110,110,24]   # [x,y,z] - nifti data array shape; atlas shape: [182, 218, 182]
    atlas:
      axis:    ''              # ['X','Y','Z'] - axis of interest
      seed:    0               # seed for randomizing noise on synthetic data based on two Gaussians
      thresh:  0.025           # MWF threshold for calculating a binary PSO mask
      T1:
        mean:  [400,1000]      # [m1,m2] for synthetic data based on two Gaussians
        width: [0.5,0.5]       # [m1_sig,m2_sig] for synthetic data based on two Gaussians
      T2:
        mean:  [20,80]         # [m1,m2] for synthetic data based on two Gaussians
        width: [0.5,0.5]       # [m1_sig,m2_sig] for synthetic data based on two Gaussians
      T2S:
        mean:  [10,40]         # [m1,m2] for synthetic data based on two Gaussians
        width: [0.5,0.5]       # [m1_sig,m2_sig] for synthetic data based on two Gaussians
        phase: [-8,0,0.5]      # [MW_f, FW_f, phi] for synthetic data based on two Gaussians
  mask:
    use:       true            # restrict data analysis to a region of interest
                               # True: use mask/path; False: use a default mask (mwf_analysis class)
    seg:       [3,4,5]         # 1.CSF, 2.Gray Matter (GM), 3.White Matter (WM)
                               # 4.Deep Gray Matter (dGM), 5.Brain Stem (BS), 6.Cerebellum (CB)
    path:      'mask/*.nii.gz' # relative mask path within your project directory 
#
# PSO specification parameters:
#
# a) comp_mode: computation mode of Particle Swarm Optimization
#    - performance and calibration tests are only relevant to developers
#    - iteration test: determine the number of iterations until the convergence threshold is reached
#    - PSO_on_slice: perform PSO slice-wise (along the 'Z' direction)
#    - PSO_on_pixel: perform PSO pixel-wise within a given slice (along the 'Z' direction) 
# b) algo_math: technical parameters used to increase algorithm performance
# c) PSO_math: mathematical specification of the PSO parametrization/execution
#
PSO_spec:
  comp_mode:
    performance_test:
      use:   false              # for developers
    calibration_test:
      use:   false              # for developers
    iter_test:
      use:   false              # whether to perform the iteration test
      slice: 7                  # slice number (along the 'Z' direction)
      thresh: 0.1               # relative change threshold (percent) between consecutive fits
      pixel: [[45,45], [30,70]] # list of pixels for the iteration test
    PSO_on_slice:
      use:   true               # whether to perform PSO slice-wise (along the 'Z' direction)
      start: 0                  # ID [int] of the start slice; Note: Python indexing starts at 0
      end:   24                 # ID [int] of the end slice;   Note: until, but not included
    PSO_on_pixel:
      use:   false              # whether to perform PSO pixel-wise within a given slice
      slice: 7                  # slice number (along the 'Z' direction)
      pixel: [[50,65], [30,70]] # list of pixels for the PSO_on_pixel execution
  algo_math:
    width:  10                  # Gaussian width (σ); beyond ~6.5·σ fitness contributions are negligible
    batch:  16                  # batch size: number of particles used per model run
    njit:   true                # whether to use numba njit acceleration
  PSO_math:
    pixel:     [0,0]            # internal: pixel on which PSO is executed (auto-filled)
    rand:      [true, 0]        # random seed control for reproducible PSO runs (default seed = 0)
    norm:      true             # normalize synthetic curves to maximum value (recommended)
    lp_norm:   'L2'             # objective function norm (L1: Manhattan, L2: Euclidean)
    weights:   [1.0,1.0,1.0]    # weighting factors (α, β, γ) for joint objective terms
    n_iter:    15               # number of iterations during one PSO execution
    n_part:    32               # number of particles; Note: must be a multiple of the batch size (algo_math)    
    n_comp:    2                # components: 2 → MW, FW | 3 → MW, AW, EW
    n_mod_vec: 2                # number of model vectors (V0: 2, V1: 1)
    cyc_slice: 100              # number of individual PSO executions per slice
    cyc_pixel: 10000            # number of individual PSO executions per pixel